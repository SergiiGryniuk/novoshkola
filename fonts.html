<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Size Comparison</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0C110D;
      color: #F0EDE6;
      font-family: 'DM Sans', system-ui, sans-serif;
      margin: 0;
      padding: 60px 48px;
    }

    .row {
      display: flex;
      align-items: baseline;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid rgba(240, 237, 230, 0.08);
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: rgba(240, 237, 230, 0.35);
      min-width: 40px;
      text-transform: uppercase;
    }

    .sample { line-height: 1.65; }
  </style>
</head>
<body>

  <div class="row">
    <span class="label">14px</span>
    <span class="sample" style="font-size: 14px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">15px</span>
    <span class="sample" style="font-size: 15px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">16px</span>
    <span class="sample" style="font-size: 16px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">17px</span>
    <span class="sample" style="font-size: 17px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">18px</span>
    <span class="sample" style="font-size: 18px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">19px</span>
    <span class="sample" style="font-size: 19px">Grades 1–11 · Native Speaker</span>
  </div>

  <div class="row">
    <span class="label">20px</span>
    <span class="sample" style="font-size: 20px">Grades 1–11 · Native Speaker</span>
  </div>

</body>
</html>
